<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>James Hunt — guest@jameshunt.nz:~$</title>
        <meta
            name="description"
            content="A portfolio you ssh into. Look around — nothing's off limits."
        />
        <link rel="canonical" href="https://jameshunt.nz/" />

        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://jameshunt.nz/" />
        <meta property="og:title" content="James Hunt — guest@jameshunt.nz:~$" />
        <meta
            property="og:description"
            content="A portfolio you ssh into. Look around — nothing's off limits."
        />
        <meta property="og:image" content="https://jameshunt.nz/og-image.png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />

        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="James Hunt — guest@jameshunt.nz:~$" />
        <meta
            name="twitter:description"
            content="A portfolio you ssh into. Look around — nothing's off limits."
        />
        <meta name="twitter:image" content="https://jameshunt.nz/og-image.png" />

        <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
        <link rel="alternate icon" href="/favicon.ico" />
        <!-- Runs synchronously before first paint to avoid a light/dark flash —
		     stored choice wins, otherwise falls back to the OS preference. -->
        <script>
            try {
                let theme = window.matchMedia('(prefers-color-scheme: dark)').matches
                    ? 'dark'
                    : 'light';
                const stored = localStorage.getItem('jh-terminal-theme');
                if (stored === 'light' || stored === 'dark') theme = stored;
                document.documentElement.dataset.theme = theme;
            } catch (e) {}
        </script>
        <link
            rel="preload"
            href="/fonts/JetBrainsMono-Regular.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <link
            rel="preload"
            href="/fonts/JetBrainsMono-Bold.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <link rel="stylesheet" href="/src/styles/terminal.css" />
        <link rel="stylesheet" href="/src/styles/desktop.css" />
    </head>
    <body>
        <div id="splash" aria-hidden="true">
            <div class="splash-lines"></div>
        </div>

        <div id="polybar" role="banner">
            <div class="polybar-section polybar-left">
                <span class="polybar-brand">jameshunt.nz</span>
            </div>
            <div class="polybar-section polybar-center polybar-workspaces"></div>
            <div class="polybar-section polybar-right">
                <span class="polybar-clock"></span>
                <button
                    type="button"
                    class="polybar-theme-toggle"
                    aria-label="Toggle theme"
                ></button>
                <button
                    type="button"
                    class="polybar-new-window"
                    title="New terminal (Ctrl/Cmd+Enter)"
                >
                    + term
                </button>
            </div>
        </div>

        <div id="desktop" role="main">
            <h1 class="sr-only">James Hunt — Portfolio Terminal</h1>
            <p class="desktop-hint">
                Press <kbd>Ctrl</kbd>/<kbd>Cmd</kbd>+<kbd>Enter</kbd> or click "+ term" to open a
                window.
            </p>
        </div>

        <template id="window-template">
            <div class="window">
                <div class="window-titlebar">
                    <span class="window-title"></span>
                    <button class="window-close" aria-label="Close window">×</button>
                </div>
                <div class="window-body">
                    <div class="terminal" role="region" aria-label="Terminal">
                        <div class="terminal-inner">
                            <div
                                class="screen"
                                role="log"
                                aria-live="polite"
                                aria-label="Terminal output"
                            ></div>
                            <div class="input-line">
                                <span class="prompt" aria-hidden="true"></span>
                                <span class="typed" aria-hidden="true"></span>
                            </div>
                        </div>
                        <!--suppress HtmlDeprecatedAttribute -->
                        <input
                            class="hidden-input"
                            type="text"
                            aria-label="Terminal command input"
                            autocomplete="off"
                            autocapitalize="off"
                            autocorrect="off"
                            spellcheck="false"
                        />
                    </div>
                </div>
                <div class="resize-handle" aria-hidden="true"></div>
            </div>
        </template>

        <script type="module" src="/src/scripts/main.ts"></script>
    </body>
</html>
